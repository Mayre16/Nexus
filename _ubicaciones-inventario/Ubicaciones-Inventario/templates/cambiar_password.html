<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - WMS</title>
    <link rel="stylesheet" href="/static/css/wms.css">
    <link rel="stylesheet" href="/static/css/cambiar-password.css">
</head>
<body>
    <div class="pw-wrapper">
        <div class="pw-header">
            <div class="pw-header-icon">🔐</div>
            <h1>Cambiar Contraseña</h1>
            <p>Ingresa tu contraseña actual y la nueva contraseña (mínimo 6 caracteres).</p>
        </div>

        <div class="pw-card">
            <div id="error-message" class="pw-alert pw-alert-error"></div>
            <div id="success-message" class="pw-alert pw-alert-success"></div>

            <form id="password-form">
                <div class="wms-form-group">
                    <label for="password-actual">Contraseña Actual</label>
                    <input type="password" id="password-actual" class="wms-input" required placeholder="Tu contraseña actual" autocomplete="current-password">
                </div>
                <div class="wms-form-group">
                    <label for="password-nueva">Nueva Contraseña</label>
                    <input type="password" id="password-nueva" class="wms-input" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                </div>
                <div class="wms-form-group">
                    <label for="password-confirmar">Confirmar Nueva Contraseña</label>
                    <input type="password" id="password-confirmar" class="wms-input" required minlength="6" placeholder="Repite la nueva contraseña" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-submit" id="btn-submit">Cambiar Contraseña</button>
            </form>
        </div>
    </div>

    <script src="/static/js/cambiar-password.js"></script>
</body>
</html>
