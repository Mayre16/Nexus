<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WMS Despacho</title>
    <link rel="stylesheet" href="/static/css/wms.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <script>window.FEATURE_MUST_CHANGE_PASSWORD = {{ 'true' if (feature_must_change_password | default(false)) else 'false' }};</script>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-brand-icon">🚚</div>
            <h1>WMS Despacho</h1>
            <p>Sistema de Gestión de Almacenes</p>
        </div>

        <div class="login-card">
            <div id="error-message" class="login-error"></div>
            <form id="login-form">
                <div class="wms-form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" class="wms-input" required placeholder="usuario@empresa.com" autocomplete="email">
                </div>
                <div class="wms-form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="wms-input" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="btn-login">Iniciar Sesión</button>
            </form>
        </div>

        <div class="login-footer">
            <p>&copy; 2024 WMS Despacho &mdash; ADESA</p>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
