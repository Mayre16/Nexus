<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Transferencias - WMS</title>
    <link rel="stylesheet" href="/static/css/wms.css">
    <link rel="stylesheet" href="/static/css/transferencias-historial.css">
</head>
<body>
    <header class="wms-header">
        <div class="wms-header-inner">
            <div class="wms-header-title">
                <span class="module-icon">🔄</span>
                <h1>Historial de Transferencias</h1>
            </div>
            <div class="wms-header-actions">
                <span class="wms-header-user" id="user-info">Cargando...</span>
                <a href="/" class="wms-btn wms-btn-secondary wms-btn-sm" title="Inicio">🏠 <span class="wms-header-btn-label">Inicio</span></a>
                <button type="button" class="wms-btn wms-btn-secondary wms-btn-sm" onclick="cerrarSesion()" title="Cerrar sesión"><span class="wms-icon-logout" aria-hidden="true"></span> <span class="wms-header-btn-label">Salir</span></button>
            </div>
        </div>
    </header>

    <div class="wms-page">
        <div id="message-success" class="wms-toast wms-toast-success"></div>
        <div id="message-error" class="wms-toast wms-toast-error"></div>

        <div class="wms-card">
            <div class="wms-card-header">
                <h2>📋 Registros de Transferencias</h2>
                <button class="wms-btn wms-btn-primary wms-btn-sm" onclick="nuevaTransferencia()">+ Nueva Transferencia</button>
            </div>

            <div class="wms-card-body">
                <div class="wms-list-toolbar">
                    <button class="wms-filters-toggle" type="button" aria-expanded="false">Filtros <span class="chevron">▼</span></button>
                    <div class="wms-list-toolbar-search">
                        <input type="text" id="search" class="wms-input" placeholder="Buscar por número, origen, destino..." onkeyup="if(event.key==='Enter') aplicarFiltros()">
                    </div>
                </div>
                <div class="wms-filters collapsible">
                    <div class="wms-filters-grid">
                        <div class="wms-form-group">
                            <label class="wms-label">Fecha Desde</label>
                            <input type="date" id="fecha_desde" class="wms-input">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Fecha Hasta</label>
                            <input type="date" id="fecha_hasta" class="wms-input">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Ubicación Origen</label>
                            <input type="text" id="ubicacion_origen" class="wms-input" placeholder="Ej: ADESA">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Ubicación Destino</label>
                            <input type="text" id="ubicacion_destino" class="wms-input" placeholder="Ej: Mirador Sur">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Estado</label>
                            <select id="estado" class="wms-select">
                                <option value="">Todos</option>
                                <option value="PROCESADA">Procesada</option>
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="ERROR">Error</option>
                            </select>
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Usuario</label>
                            <select id="usuario_id" class="wms-select">
                                <option value="">Todos</option>
                            </select>
                        </div>
                    </div>
                    <div class="wms-filters-actions">
                        <button class="wms-btn wms-btn-secondary wms-btn-sm" onclick="limpiarFiltros()">Limpiar</button>
                        <button class="wms-btn wms-btn-primary wms-btn-sm" onclick="aplicarFiltros()">Aplicar Filtros</button>
                    </div>
                </div>

                <div class="wms-table-wrap">
                    <table class="wms-table" id="tabla-transferencias">
                        <thead>
                            <tr>
                                <th>Número</th>
                                <th>Fecha</th>
                                <th>Origen</th>
                                <th>Destino</th>
                                <th>Fís. Origen</th>
                                <th>Fís. Destino</th>
                                <th>Prod.</th>
                                <th>Estado</th>
                                <th>Solicitante</th>
                                <th>Usuario</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="transferencias-tbody">
                            <tr><td colspan="11" class="text-center" style="padding:var(--space-8)"><div class="wms-loading"><div class="wms-spinner"></div> Cargando...</div></td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="wms-mobile-cards" id="transferencias-cards"></div>

                <div class="wms-pagination">
                    <div class="wms-pagination-info" id="pagination-info">Mostrando 0 de 0 registros</div>
                    <div class="wms-pagination-controls" id="pagination-controls"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/security_utils.js"></script>
    <script src="/static/js/fecha_utils.js"></script>
    <script src="/static/js/wms-common.js"></script>
    <script src="/static/js/transferencias-historial.js"></script>
</body>
</html>
