<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Recepciones - WMS</title>
    <link rel="stylesheet" href="/static/css/wms.css">
    <link rel="stylesheet" href="/static/css/recepciones-historial.css">
</head>
<body>
    <header class="wms-header">
        <div class="wms-header-inner">
            <div class="wms-header-title">
                <span class="module-icon">📦</span>
                <h1>Historial de Recepciones</h1>
            </div>
            <div class="wms-header-actions">
                <span class="wms-header-user" id="user-info">Cargando...</span>
                <a href="/" class="wms-btn wms-btn-secondary wms-btn-sm" title="Inicio">🏠 <span class="wms-header-btn-label">Inicio</span></a>
                <button type="button" class="wms-btn wms-btn-secondary wms-btn-sm" onclick="cerrarSesion()" title="Cerrar sesión"><span class="wms-icon-logout" aria-hidden="true"></span> <span class="wms-header-btn-label">Salir</span></button>
            </div>
        </div>
    </header>

    <div class="wms-page">
        <div id="message-success" class="wms-toast wms-toast-success"></div>
        <div id="message-error" class="wms-toast wms-toast-error"></div>

        <div class="wms-card">
            <div class="wms-card-header">
                <h2>📋 Registros de Recepciones</h2>
                <button class="wms-btn wms-btn-success wms-btn-sm" onclick="nuevaRecepcion()">+ Nueva Recepción</button>
            </div>

            <div class="wms-card-body">
                <div class="wms-list-toolbar">
                <button class="wms-filters-toggle" type="button">Filtros <span class="chevron">▼</span></button>
                <div class="wms-list-toolbar-search">
                    <input type="text" id="search" class="wms-input" placeholder="Buscar por número, notas..." onkeyup="if(event.key==='Enter') aplicarFiltros()">
                </div>
                </div>
                <div class="wms-filters collapsible">
                    <div class="wms-filters-grid">
                        <div class="wms-form-group">
                            <label class="wms-label">Fecha Desde</label>
                            <input type="date" id="fecha_desde" class="wms-input">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Fecha Hasta</label>
                            <input type="date" id="fecha_hasta" class="wms-input">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Ubicación ADM</label>
                            <input type="text" id="ubicacion_adm" class="wms-input" placeholder="Ej: ADESA">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Ubicación Física</label>
                            <input type="text" id="ubicacion_fisica" class="wms-input" placeholder="Ej: A-01-02">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Proveedor</label>
                            <input type="text" id="proveedor" class="wms-input" placeholder="Nombre del proveedor">
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Tipo de Recepción</label>
                            <select id="tipo_recepcion" class="wms-select">
                                <option value="">Todos</option>
                                <option value="RECEPTION">Recepción (Conduce/Ajuste)</option>
                                <option value="VEND_REC">Compra con Recepción</option>
                                <option value="CREDIT_NOTE">Nota de Crédito</option>
                            </select>
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Estado</label>
                            <select id="estado" class="wms-select">
                                <option value="">Todos</option>
                                <option value="PENDIENTE">Pendiente</option>
                                <option value="EN_PROCESO">En Proceso</option>
                                <option value="COMPLETO">Completo</option>
                                <option value="PROCESADA">Procesada</option>
                            </select>
                        </div>
                        <div class="wms-form-group">
                            <label class="wms-label">Usuario</label>
                            <select id="usuario_id" class="wms-select">
                                <option value="">Todos</option>
                            </select>
                        </div>
                    </div>
                    <div class="wms-filters-actions">
                        <button class="wms-btn wms-btn-secondary wms-btn-sm" onclick="limpiarFiltros()">Limpiar</button>
                        <button class="wms-btn wms-btn-primary wms-btn-sm" onclick="aplicarFiltros()">Aplicar Filtros</button>
                    </div>
                </div>

                <div class="wms-table-wrap">
                    <table class="wms-table" id="tabla-recepciones">
                        <thead>
                            <tr>
                                <th>Número</th>
                                <th>Fecha</th>
                                <th>Tipo</th>
                                <th>Proveedor</th>
                                <th>Ubic. ADM</th>
                                <th>Ubic. Físicas</th>
                                <th>Prod.</th>
                                <th>Cant.</th>
                                <th>Estado</th>
                                <th>Solicitante</th>
                                <th>Usuario</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="recepciones-tbody">
                            <tr><td colspan="12" class="text-center" style="padding:var(--space-8)"><div class="wms-loading"><div class="wms-spinner"></div> Cargando...</div></td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="wms-mobile-cards" id="recepciones-cards"></div>

                <div class="wms-pagination">
                    <div class="wms-pagination-info" id="pagination-info">Mostrando 0 de 0 registros</div>
                    <div class="wms-pagination-controls" id="pagination-controls"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/security_utils.js"></script>
    <script src="/static/js/wms-common.js"></script>
    <script src="/static/js/recepciones-historial.js"></script>
</body>
</html>
